<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calcul d'un emprunt</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <h1>
        Calcul d'un emprunt
    </h1>

    <div>
        <label for="montantEmprunt">
            Montant Emprunt
        </label>
        <input name="montantEmprunt" id="montantEmprunt">
    </div>

    <div>
        <label for="tauxInteret">
            Taux d'Intérêts (en %)
        </label>
        <input name="tauxInteret" id="tauxInteret">
    </div>

    <div>
        <label for="duration">
            Durée
        </label>
        <input name="duration" id="duration">
    </div>

    <div>
        <label for="periodiciteRemboursement">
            Périodicité des remboursements
        </label>
        <select name="periodiciteRemboursement" id="periodiciteRemboursement">
            <option value="mensuel">Mensualités</option>
            <option value="trimestre">Trimestrialités</option>
            <option value="semestre">Semestrialités</option>
            <option value="annuite">Annuités</option>
        </select>
    </div>

    <button id="startButton">
        Lancer la simulation
    </button>

    <div id="tableSection"></div>

    <script src="scriptTableau.js"></script>
</body>
</html>
