<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div>
        <label for="tauxEmprunt">
            Montant Taux Emprunt
        </label>
        <input name="tauxEmprunt" id="tauxEmprunt" />
    </div>
    <div>
        <label for="tauxAnnuel">
            Taux Annuel
        </label>
        <input name="tauxAnnuel" id="tauxAnnuel" />
    </div>
    <div>
        <label for="duration">
            Durée (en années)
        </label>
        <input name="duration" id="duration" />
    </div>
    <div>
        <label for="periodiciteRemboursement">
            Périodicité des remboursements
        </label>
        <select name="periodiciteRemboursement" id="periodiciteRemboursement">
            <option value="mensuel">Mensualités</option>
            <option value="trimestre">Trimestrialités</option>
            <option value="semestre">Semestrialités</option>
            <option value="annuite">Annuités</option>
        </select>
    </div>
    <div>
        <label for="amortissementType">
            Type d'amortissement
        </label>
        <select name="amortissementType" id="amortissementType">
            <option value="annuite">Annuités constantes</option>
            <option value="amortissemment">Amortissements constants</option>
        </select>
    </div>
    <button id="startButton">
        Lancer la simulation
    </button>

    <div id="tableSection">

    </div>

    <script>
      const tableSection = document.getElementById("tableSection");
      const startButton = document.getElementById("startButton");
        startButton.addEventListener("click", () => {
          // Fonction qui se lance quand l'utilisateur appuie sur le bouton
          // Lancement de la simulation

          const tauxEmprunt = document.getElementById("tauxEmprunt").value;
          const tauxAnnuel = document.getElementById("tauxAnnuel").value;
          const duration = document.getElementById("duration").value;
          const periodiciteRemboursement = document.getElementById("periodiciteRemboursement").value;
          const amortissementType = document.getElementById("amortissementType").value;

          console.log(tauxEmprunt, tauxAnnuel, duration, periodiciteRemboursement, amortissementType);


          var table = document.createElement("table");

          table.innerHTML = `<thead>
            <tr>
                <th>Années</th>
                <th>Capital restant du en début de période</th>
                <th>Intérêts</th>
                <th>Amortissements</th>
                <th>Annuités</th>
                <th>Capital restant du en fin de période</th>
            </tr>
        </thead>`;

          table.innerHTML += `<tbody>
            <tr>
                <th>1</th>
                <td>...</td>
                <td>...</td>
                <td>...</td>
                <td>...</td>
                <td>...</td>
            </tr>
        </tbody>`;

          // for (let year = 0; year < duration; year++) {
          //
          // }

          document.body.append(table);
        });
    </script>
</body>
</html>
